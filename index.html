<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raio-X Anti-Curiosos</title>
  <style>
    :root{--bg:#020617;--card:#050816;--dark:#030712;--text:#f8fafc;--muted:#94a3b8;--cyan:#22d3ee;--cyan2:#0891b2;--success:#22c55e;--border:rgba(148,163,184,.18);--danger:#fb7185}*{box-sizing:border-box}body{min-height:100vh;margin:0;display:flex;align-items:center;justify-content:center;padding:32px 16px;background:radial-gradient(circle at top left,rgba(34,211,238,.2),transparent 34%),radial-gradient(circle at bottom right,rgba(8,145,178,.22),transparent 36%),linear-gradient(135deg,#020617,#06111f 48%,#020617);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}button,input{font:inherit}.shell{width:100%;max-width:640px}.card{overflow:hidden;min-height:620px;border:1px solid var(--border);border-radius:18px;background:linear-gradient(180deg,rgba(15,23,42,.75),rgba(5,8,22,.98)),var(--card);box-shadow:0 30px 90px rgba(0,0,0,.58),0 0 70px rgba(34,211,238,.08)}.progress-track{height:6px;background:rgba(148,163,184,.12)}.progress-bar{width:0;height:100%;background:linear-gradient(90deg,var(--cyan),#2563eb);border-radius:999px;box-shadow:0 0 18px rgba(34,211,238,.55);transition:width .35s ease}.content{padding:34px;animation:enter .32s ease both}@keyframes enter{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.eyebrow{display:inline-flex;margin-bottom:18px;padding:7px 11px;border:1px solid rgba(34,211,238,.25);border-radius:999px;color:var(--cyan);background:rgba(34,211,238,.08);font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}h1,h2,h3{margin:0;letter-spacing:-.04em;line-height:1.05}h1{font-size:clamp(34px,7vw,54px)}h2{font-size:clamp(28px,5vw,40px)}h3{font-size:21px}p{margin:0;color:var(--muted);line-height:1.6}.subtitle{margin-top:14px;font-size:18px;color:#cbd5e1}.description{margin-top:16px;font-size:15px}.form-grid{display:grid;gap:14px;margin-top:26px}label{display:grid;gap:7px;color:#cbd5e1;font-size:13px;font-weight:800}input{width:100%;border:1px solid var(--border);border-radius:14px;outline:none;padding:14px 15px;color:var(--text);background:rgba(2,6,23,.72);transition:.2s}input:focus{border-color:rgba(34,211,238,.72);box-shadow:0 0 0 4px rgba(34,211,238,.1)}.error{min-height:22px;margin-top:14px;color:var(--danger);font-size:13px;font-weight:800}.step-meta{display:flex;justify-content:space-between;gap:16px;margin-bottom:18px;color:var(--muted);font-size:13px;font-weight:800}.options{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:26px}.option-card{min-height:130px;padding:17px;border:1px solid var(--border);border-radius:16px;color:#dbeafe;background:rgba(2,6,23,.5);cursor:pointer;text-align:left;transition:.2s}.option-card:hover{transform:translateY(-2px);border-color:rgba(34,211,238,.45);background:rgba(8,145,178,.1)}.option-card.selected{border-color:var(--cyan);background:linear-gradient(180deg,rgba(34,211,238,.16),rgba(37,99,235,.08));box-shadow:0 0 0 4px rgba(34,211,238,.08)}.option-card span{display:block;color:var(--cyan);font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}.actions{display:flex;justify-content:space-between;gap:12px;margin-top:28px}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:13px 18px;border:0;border-radius:14px;cursor:pointer;color:var(--text);font-weight:900;text-decoration:none;transition:.2s}.btn:hover{transform:translateY(-1px)}.btn-primary{background:linear-gradient(135deg,var(--cyan),#2563eb);color:#001018;box-shadow:0 16px 34px rgba(8,145,178,.3)}.btn-secondary{border:1px solid var(--border);background:rgba(2,6,23,.6);color:#cbd5e1}.loader-wrap{display:grid;place-items:center;min-height:540px;text-align:center}.loader{width:62px;height:62px;margin:0 auto 24px;border:4px solid rgba(148,163,184,.18);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.result-box,.insight-box,.prompt-box,.cta-box{border:1px solid var(--border);border-radius:18px;background:rgba(3,7,18,.72)}.result-box{margin-top:22px;padding:20px}.score-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:18px}.score-item{padding:14px;border:1px solid var(--border);border-radius:14px;background:rgba(15,23,42,.52)}.score-item strong{display:block;margin-top:6px;color:var(--text);font-size:15px}.score-item small{color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.06em}.section{margin-top:22px}.section h3{margin-bottom:9px}ul{margin:10px 0 0;padding-left:20px;color:var(--muted);line-height:1.65}.impact{margin-top:18px;padding:16px;border-left:3px solid var(--cyan);border-radius:14px;background:rgba(34,211,238,.08);color:#e0f2fe;font-weight:900}.insight-box,.cta-box{margin-top:18px;padding:18px}.prompt-box{margin-top:16px;padding:16px;background:#020617}pre{max-height:360px;margin:0;overflow:auto;white-space:pre-wrap;color:#ccfbf1;font:13px/1.55 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.success-text{color:var(--success)}.wide-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}.wide-actions .btn,.cta-box .btn{width:100%}@media(max-width:680px){body{padding:14px;align-items:flex-start}.card{min-height:calc(100vh - 28px)}.content{padding:24px 18px}.options,.score-grid,.wide-actions{grid-template-columns:1fr}.actions{flex-direction:column-reverse}.btn{width:100%}}
  </style>
</head>
<body>
  <main class="shell"><section class="card"><div class="progress-track"><div class="progress-bar" id="progressBar"></div></div><div id="app"></div></section></main>
  <script>
    const SHEETS_WEBHOOK_URL = '';
    const QUESTIONS = [
      {id:1,category:'entrada',title:'Hoje, como a maioria dos leads chega até você?',subtitle:'Pense no caminho mais comum antes da pessoa chamar você ou seu time.',options:[{text:'Chegam por canais diferentes e eu não sei bem de onde vieram.',score:0},{text:'Chegam principalmente por Instagram, indicação ou WhatsApp, mas sem muita organização.',score:1},{text:'Chegam por canais definidos, mas ainda sem filtro antes da conversa.',score:2},{text:'Chegam por canais definidos e já passam por algum tipo de qualificação.',score:3}]},
      {id:2,category:'entrada',title:'Quando o lead chama você ou sua equipe, ele já chega com contexto?',subtitle:'Ou seja: ele já entende minimamente o que você faz e por que deveria conversar?',options:[{text:'Não. Geralmente chega perdido ou perguntando preço.',score:0},{text:'Chega com uma ideia vaga, mas ainda precisa entender quase tudo.',score:1},{text:'Chega sabendo parte do que oferecemos.',score:2},{text:'Chega entendendo a oferta, a dor e o próximo passo.',score:3}]},
      {id:3,category:'entrada',title:'Qual comportamento mais aparece nos seus leads?',subtitle:'Escolha o padrão mais frequente hoje.',options:[{text:'Pedem preço e somem.',score:0},{text:'Dizem que têm interesse, mas param de responder.',score:1},{text:'Alguns avançam, mas muitos ainda chegam sem perfil.',score:2},{text:'A maioria que avança tem intenção real.',score:3}]},
      {id:4,category:'mensagem',title:'Antes do WhatsApp ou da conversa, existe algum filtro?',subtitle:'Pense se existe alguma barreira antes da pessoa ocupar seu atendimento.',options:[{text:'Não. Qualquer pessoa pode chamar direto.',score:0},{text:'Existe uma chamada ou botão, mas sem qualificação.',score:1},{text:'Existe formulário, pergunta ou etapa simples antes do contato.',score:2},{text:'Existe uma triagem clara antes da conversa comercial.',score:3}]},
      {id:5,category:'mensagem',title:'Sua comunicação deixa claro para quem sua oferta é?',subtitle:'A pessoa certa se identifica rapidamente com a mensagem?',options:[{text:'Não. A mensagem é genérica.',score:0},{text:'Mais ou menos. Falo da solução, mas não filtro perfil.',score:1},{text:'Sim, mas ainda poderia ser mais específica.',score:2},{text:'Sim. A pessoa certa se identifica e a errada tende a sair.',score:3}]},
      {id:6,category:'mensagem',title:'Sua comunicação afasta quem não tem perfil?',subtitle:'Um bom funil não atrai todo mundo. Ele também repele quem não deveria avançar.',options:[{text:'Não. Tento atrair todo mundo.',score:0},{text:'Não diretamente, tenho medo de perder leads.',score:1},{text:'Às vezes uso algum aviso ou critério.',score:2},{text:'Sim. Deixo claro quem não deve avançar.',score:3}]},
      {id:7,category:'qualificacao',title:'Você faz perguntas antes de apresentar a solução?',subtitle:'Ou você explica a oferta antes de entender o cenário do lead?',options:[{text:'Não. Já explico a oferta ou mando preço.',score:0},{text:'Faço algumas perguntas, mas sem padrão.',score:1},{text:'Tenho algumas perguntas importantes.',score:2},{text:'Tenho perguntas claras antes de oferecer solução.',score:3}]},
      {id:8,category:'qualificacao',title:'Você avalia dor, urgência e capacidade antes de avançar o lead?',subtitle:'Esses são os sinais básicos para saber se existe oportunidade real.',options:[{text:'Não avalio. Se chamou, eu atendo.',score:0},{text:'Avalio de forma subjetiva durante a conversa.',score:1},{text:'Avalio alguns desses pontos, mas sem critério fixo.',score:2},{text:'Avalio dor, urgência, perfil e capacidade antes de avançar.',score:3}]},
      {id:9,category:'qualificacao',title:'Você classifica seus leads?',subtitle:'Existe diferença prática entre lead quente, morno e frio?',options:[{text:'Não. Todo lead é tratado igual.',score:0},{text:'Classifico mentalmente, mas sem registro.',score:1},{text:'Classifico como bom ou ruim, mas sem muita clareza.',score:2},{text:'Classifico como quente, morno ou frio com critérios claros.',score:3}]},
      {id:10,category:'comercial',title:'Existe critério para agendar reunião?',subtitle:'A reunião é marcada por intenção real ou só porque a pessoa demonstrou interesse?',options:[{text:'Não. Se a pessoa quer, agenda.',score:0},{text:'Agendo quando parece interessada.',score:1},{text:'Tenho alguns critérios antes de agendar.',score:2},{text:'Só agenda quem tem fit, intenção e próximo passo claro.',score:3}]},
      {id:11,category:'comercial',title:'Quem faz a venda recebe contexto antes da conversa?',subtitle:'O vendedor, closer ou responsável pela call sabe com quem está falando?',options:[{text:'Não. Vai praticamente às cegas.',score:0},{text:'Recebe só nome e contato.',score:1},{text:'Recebe algumas informações importantes.',score:2},{text:'Recebe contexto sobre dor, urgência, perfil e objeções.',score:3}]},
      {id:12,category:'comercial',title:'O lead ruim está consumindo tempo, verba ou energia do seu time?',subtitle:'Pense no impacto real de atender pessoas que não vão comprar.',options:[{text:'Muito. Isso atrapalha o comercial e o caixa.',score:0},{text:'Bastante. Ainda gastamos tempo com curiosos.',score:1},{text:'Um pouco. Já filtramos alguns, mas ainda vaza.',score:2},{text:'Pouco. O time foca mais em oportunidades reais.',score:3}]}
    ];
    const data={name:'',email:'',businessName:'',answers:[]};
    const bottleneckLabels={entrada:'Entrada dos Leads',mensagem:'Mensagem e Filtro',qualificacao:'Qualificação Comercial',comercial:'Reunião e Comercial'};
    const bottleneckTexts={entrada:{title:'Seu maior vazamento está na entrada dos leads',text:'O problema começa antes do atendimento. Os leads estão chegando sem consciência, sem contexto e sem clareza do que você vende. Isso faz o comercial gastar energia tentando educar pessoas que talvez nunca deveriam ter avançado.',action:'Ajustar promessa, CTA e canal de entrada para atrair menos curiosos e mais compradores.'},mensagem:{title:'Seu maior vazamento está na mensagem e no filtro',text:'Sua comunicação ainda está aberta demais. Ela chama atenção, mas não separa quem tem perfil de quem só quer olhar. O resultado é um funil que atrai curiosidade, mas não necessariamente intenção de compra.',action:'Criar uma mensagem-filtro com perfil claro, dor específica, promessa realista e frase anti-curioso.'},qualificacao:{title:'Seu maior vazamento está na qualificação',text:'O lead até chega, mas a conversa ainda não identifica intenção real cedo o suficiente. Isso faz você gastar tempo com pessoas que ainda não demonstraram dor, urgência, perfil ou capacidade.',action:'Criar 5 perguntas obrigatórias antes de apresentar solução ou agendar reunião.'},comercial:{title:'Seu maior vazamento está na passagem para a venda',text:'O problema está na passagem do lead para a reunião ou conversa comercial. A reunião pode estar acontecendo sem contexto suficiente ou com pessoas que ainda não deveriam estar ali.',action:'Criar critérios para agendamento e enviar contexto mínimo para quem faz a venda.'}};
    let currentStep=-1,selectedOption=null,finalPrompt='',diagnosisSaved=false,previewScore=null,previewBottleneck='';const app=document.getElementById('app'),progressBar=document.getElementById('progressBar');
    function escapeHtml(v){return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}function updateProgress(p){progressBar.style.width=p+'%'}
    function renderWelcome(){updateProgress(0);app.innerHTML=`<div class="content"><div class="eyebrow">Diagnóstico MUV Starter</div><h1>Raio-X Anti-Curiosos</h1><p class="subtitle">Descubra onde seu funil está deixando curiosos ocuparem seu WhatsApp, sua agenda e seu time comercial.</p><p class="description">Responda 12 perguntas rápidas e receba uma classificação do seu funil, o gargalo principal e um prompt pronto para gerar seu diagnóstico com IA.</p><div class="form-grid"><label>Nome<input id="name" autocomplete="name" value="${escapeHtml(data.name)}" placeholder="Seu nome"></label><label>E-mail<input id="email" type="email" autocomplete="email" value="${escapeHtml(data.email)}" placeholder="voce@email.com"></label><label>Nome do negócio<input id="businessName" value="${escapeHtml(data.businessName)}" placeholder="Nome da empresa ou projeto"></label></div><div class="error" id="formError"></div><div class="actions"><span></span><button class="btn btn-primary" onclick="startDiagnosis()">Começar Raio-X →</button></div></div>`}
    function startDiagnosis(){data.name=document.getElementById('name').value.trim();data.email=document.getElementById('email').value.trim();data.businessName=document.getElementById('businessName').value.trim();const e=document.getElementById('formError');if(!data.name||!data.email||!data.businessName){e.textContent='Preencha todos os campos para começar.';return}if(!data.email.includes('@')){e.textContent='Informe um e-mail válido.';return}currentStep=0;renderQuestion()}
    function renderQuestion(){selectedOption=data.answers[currentStep]?data.answers[currentStep].optionIndex:null;const q=QUESTIONS[currentStep];updateProgress(Math.round(((currentStep+1)/QUESTIONS.length)*86));app.innerHTML=`<div class="content"><div class="step-meta"><span>Pergunta ${currentStep+1} de ${QUESTIONS.length}</span><span>${escapeHtml(bottleneckLabels[q.category])}</span></div><h2>${escapeHtml(q.title)}</h2><p class="subtitle">${escapeHtml(q.subtitle)}</p><div class="options">${q.options.map((o,i)=>`<button class="option-card ${selectedOption===i?'selected':''}" onclick="selectOption(${i})"><span>Opção ${i+1}</span>${escapeHtml(o.text)}</button>`).join('')}</div><div class="error" id="questionError"></div><div class="actions"><button class="btn btn-secondary" onclick="goBack()">Voltar</button><button class="btn btn-primary" onclick="continueDiagnosis()">Continuar</button></div></div>`}
    function selectOption(i){selectedOption=i;document.querySelectorAll('.option-card').forEach((c,n)=>c.classList.toggle('selected',n===i));document.getElementById('questionError').textContent=''}
    function continueDiagnosis(){if(selectedOption===null){document.getElementById('questionError').textContent='Escolha uma opção para continuar.';return}const q=QUESTIONS[currentStep],o=q.options[selectedOption];data.answers[currentStep]={questionId:q.id,category:q.category,answer:o.text,score:o.score,optionIndex:selectedOption};if(currentStep<QUESTIONS.length-1){currentStep++;renderQuestion();return}renderProcessing()}
    function goBack(){if(currentStep===0){currentStep=-1;renderWelcome();return}currentStep--;renderQuestion()}
    function renderProcessing(){updateProgress(94);app.innerHTML=`<div class="content loader-wrap"><div><div class="loader"></div><h2>Analisando seu funil...</h2><p class="subtitle">Estamos identificando onde os curiosos estão vazando para dentro da sua operação comercial.</p></div></div>`;setTimeout(renderResult,1200)}
    function calculateScore(){return previewScore!==null?previewScore:data.answers.reduce((t,a)=>t+a.score,0)}
    function getResult(score){if(score<=7)return{resultName:'Funil Cego',leakLevel:'Crítico',diagnosis:'Seu funil está atraindo pessoas sem saber quem realmente tem intenção de compra. Hoje, o maior problema não parece ser falta de lead. O problema é que qualquer pessoa pode entrar, perguntar, consumir tempo e avançar como se fosse oportunidade.',symptoms:['O lead chega sem contexto.','A comunicação é genérica.','O WhatsApp vira suporte de curioso.','Você não sabe qual canal traz comprador.','O comercial só descobre tarde demais que o lead não tem perfil.'],cost:'Tempo, verba, energia comercial e previsibilidade de caixa.',nextStep:'Antes de pensar em mais tráfego, crie a primeira barreira: uma mensagem e uma triagem simples para separar curioso de comprador.',impactPhrase:'Você não tem um problema de volume. Você tem um problema de entrada.'};if(score<=14)return{resultName:'Funil Solto',leakLevel:'Alto',diagnosis:'Seu funil já capta leads, mas ainda não qualifica com critério. Existe movimento, mas falta controle. As pessoas chegam, chamam, perguntam, somem e obrigam você ou seu time a descobrir manualmente quem vale atenção.',symptoms:['Você até gera leads, mas muitos não têm intenção real.','O WhatsApp recebe contatos sem filtro.','A conversa depende muito do feeling do atendente.','O time perde tempo tentando separar quem compra de quem só está olhando.','A agenda pode estar cheia, mas nem sempre produtiva.'],cost:'Tempo comercial, follow-ups improdutivos e reuniões com baixa chance de fechamento.',nextStep:'Criar critérios mínimos antes da conversa: dor, urgência, perfil e capacidade.',impactPhrase:'Seu funil não está parado. Ele está solto.'};if(score<=22)return{resultName:'Funil Reativo',leakLevel:'Médio',diagnosis:'Seu funil responde, mas ainda não conduz. Você já tem algum processo, mas o lead ainda controla boa parte da conversa. Quando ele pergunta preço, você responde. Quando ele some, você corre atrás. Quando ele agenda, nem sempre chega com contexto suficiente.',symptoms:['Existe atendimento, mas pouca condução.','A qualificação acontece tarde.','O follow-up é mais cobrança do que avanço.','A equipe ainda trata muito lead médio como oportunidade real.','A reunião pode acontecer sem clareza de dor, urgência ou capacidade.'],cost:'Energia do time, agenda improdutiva, perda de compradores reais e caixa instável.',nextStep:'Montar um roteiro de triagem com 5 perguntas simples antes de avançar o lead: cenário, dor, urgência, objetivo e capacidade.',impactPhrase:'Seu WhatsApp não pode apenas responder. Ele precisa qualificar.'};if(score<=29)return{resultName:'Funil Parcial',leakLevel:'Moderado',diagnosis:'Seu funil já tem algumas peças funcionando, mas elas ainda não estão totalmente integradas. Você provavelmente tem canais definidos, alguma triagem, algum critério comercial e talvez até follow-up. O problema é que o processo ainda depende muito de pessoas, memória, improviso ou esforço manual.',symptoms:['Você já filtra alguns curiosos.','O time tem alguma noção de lead bom e ruim.','Existem critérios, mas nem sempre são aplicados.','O closer ainda recebe leads com contexto incompleto.','O processo funciona melhor quando alguém experiente acompanha.'],cost:'Falta de padrão, perda de controle e dificuldade para escalar o comercial com previsibilidade.',nextStep:'Padronizar a classificação entre quente, morno e frio e conectar isso com mensagem-filtro, WhatsApp e reunião.',impactPhrase:'Você tem peças boas, mas ainda falta sistema.'};return{resultName:'Funil com Filtro Inicial',leakLevel:'Controlado',diagnosis:'Seu funil já possui uma primeira camada de filtro. Você sabe que nem todo lead é oportunidade, tem critérios para avançar e já evita que parte dos curiosos tome tempo do comercial. Agora, o próximo desafio é evoluir de filtro inicial para uma infraestrutura comercial mais previsível.',symptoms:['O lead já chega com mais contexto.','Existe algum critério antes da reunião.','O time sabe identificar parte dos curiosos.','A conversa comercial é mais produtiva.','Ainda falta integração entre mensagem, triagem, IA, CRM, follow-up e métricas.'],cost:'O funil já está melhor, mas ainda pode depender demais de execução manual e ajustes individuais.',nextStep:'Usar o diagnóstico para evoluir para Prompt Mestre, WhatsApp IA, CRM, follow-up e arquitetura completa.',impactPhrase:'Você já tem filtro. Agora precisa transformar filtro em previsibilidade.'}}
    function getMainBottleneck(){if(previewBottleneck)return previewBottleneck;const s={entrada:0,mensagem:0,qualificacao:0,comercial:0};data.answers.forEach(a=>s[a.category]+=a.score);return['mensagem','qualificacao','entrada','comercial'].reduce((low,c)=>s[c]<s[low]?c:low,'mensagem')}
    function generatePrompt(){const score=calculateScore(),r=getResult(score),b=getMainBottleneck();return ['Atue como um estrategista comercial especializado em funis de vendas com IA.','','Com base no meu Raio-X Anti-Curiosos, analise meu funil atual.','','Dados do diagnóstico:','',`* Nome: ${data.name}`,`* Negócio: ${data.businessName}`,`* Classificação do funil: ${r.resultName}`,`* Pontuação: ${score}/36`,`* Nível de vazamento: ${r.leakLevel}`,`* Gargalo principal: ${bottleneckLabels[b]}`,`* Como os leads chegam hoje: ${data.answers[0].answer}`,`* Nível de contexto do lead: ${data.answers[1].answer}`,`* Comportamento mais comum: ${data.answers[2].answer}`,`* Filtro antes da conversa: ${data.answers[3].answer}`,`* Clareza da comunicação: ${data.answers[4].answer}`,`* Capacidade de afastar curiosos: ${data.answers[5].answer}`,`* Perguntas antes da solução: ${data.answers[6].answer}`,`* Avaliação de dor, urgência e capacidade: ${data.answers[7].answer}`,`* Classificação de leads: ${data.answers[8].answer}`,`* Critério para reunião: ${data.answers[9].answer}`,`* Contexto para o vendedor/closer: ${data.answers[10].answer}`,`* Impacto do lead ruim: ${data.answers[11].answer}`,'','Com base nisso, gere:','','1. Um diagnóstico direto do meu funil atual.','2. Onde os curiosos provavelmente estão entrando.','3. Qual é o principal gargalo de triagem.','4. Quais sinais mostram que o lead não tem intenção real.','5. 5 perguntas que eu deveria fazer antes de avançar o lead.','6. Uma ação simples para melhorar meu filtro ainda hoje.','7. Uma recomendação para o próximo passo dentro do MUV Starter.','','Ao final, faça novas perguntas com base no contexto do meu negócio e nas respostas do diagnóstico para investigar mais a fundo onde está o vazamento do funil. As perguntas devem ajudar a descobrir causas específicas, exemplos reais de leads ruins, pontos de atrito na jornada e oportunidades de melhoria na triagem.','','Responda de forma prática, direta e organizada.'].join('\n')}
    function renderResult(){updateProgress(100);const score=calculateScore(),r=getResult(score),b=getMainBottleneck(),bi=bottleneckTexts[b];finalPrompt=generatePrompt();app.innerHTML=`<div class="content"><div class="eyebrow success-text">Diagnóstico concluído</div><h2>Seu resultado: ${escapeHtml(r.resultName)}</h2><div class="result-box"><div class="score-grid"><div class="score-item"><small>Pontuação</small><strong>${score} de 36 pontos</strong></div><div class="score-item"><small>Gargalo principal</small><strong>${escapeHtml(bottleneckLabels[b])}</strong></div><div class="score-item"><small>Nível de vazamento</small><strong>${escapeHtml(r.leakLevel)}</strong></div></div><div class="section"><h3>Diagnóstico principal</h3><p>${escapeHtml(r.diagnosis)}</p></div><div class="section"><h3>O que provavelmente está acontecendo</h3><ul>${r.symptoms.map(i=>`<li>${escapeHtml(i)}</li>`).join('')}</ul></div><div class="section"><h3>O que isso está custando</h3><p>${escapeHtml(r.cost)}</p></div><div class="section"><h3>Próximo passo recomendado</h3><p>${escapeHtml(r.nextStep)}</p></div><div class="impact">${escapeHtml(r.impactPhrase)}</div></div><div class="insight-box"><h3>${escapeHtml(bi.title)}</h3><p class="description">${escapeHtml(bi.text)}</p><p class="description"><strong>Ação recomendada:</strong> ${escapeHtml(bi.action)}</p></div><div class="section"><h3>Prompt final para copiar e usar com IA</h3><div class="prompt-box"><pre id="promptText">${escapeHtml(finalPrompt)}</pre></div><div class="wide-actions"><button class="btn btn-primary" id="copyButton" onclick="copyPrompt()">Copiar diagnóstico e prompt</button><button class="btn btn-secondary" onclick="resetAll()">Refazer diagnóstico</button></div></div><div class="cta-box"><h3>Próximo passo: construir seu Filtro Anti-Curiosos</h3><p class="description">Agora que você identificou onde o funil está vazando, o próximo passo é transformar esse diagnóstico em critérios práticos de qualificação, mensagem-filtro e triagem no WhatsApp.</p><div class="section"><a class="btn btn-primary" href="#">Avançar para o próximo passo</a></div></div></div>`;if(!diagnosisSaved){saveDiagnosis();diagnosisSaved=true}}
    function saveDiagnosis(){if(!SHEETS_WEBHOOK_URL)return;const score=calculateScore(),r=getResult(score),b=getMainBottleneck(),payload={submittedAt:new Date().toISOString(),name:data.name,email:data.email,businessName:data.businessName,totalScore:score,result:r.resultName,leakLevel:r.leakLevel,mainBottleneck:bottleneckLabels[b],generatedPrompt:finalPrompt};data.answers.forEach((a,i)=>{payload[`q${i+1}Answer`]=a.answer;payload[`q${i+1}Score`]=a.score});fetch(SHEETS_WEBHOOK_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)}).catch(()=>{})}
    function copyPrompt(){const text=finalPrompt||document.getElementById('promptText').textContent,done=()=>{const b=document.getElementById('copyButton');b.textContent='Copiado!';setTimeout(()=>b.textContent='Copiar diagnóstico e prompt',1800)};if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));return}fallbackCopy(text,done)}
    function fallbackCopy(text,done){const area=document.createElement('textarea');area.value=text;area.style.position='fixed';area.style.opacity='0';document.body.appendChild(area);area.select();document.execCommand('copy');document.body.removeChild(area);done()}
    function fillPreviewData(score,bottleneck){let remaining=score;previewScore=score;previewBottleneck=bottleneck;data.name='Preview';data.email='preview@email.com';data.businessName='Negócio de exemplo';data.answers=QUESTIONS.map(q=>{const optionIndex=Math.min(3,remaining);remaining-=optionIndex;const o=q.options[optionIndex];return{questionId:q.id,category:q.category,answer:o.text,score:o.score,optionIndex}})}
    function renderPreviewIndex(){updateProgress(100);const results=[{label:'Funil Cego',score:7},{label:'Funil Solto',score:14},{label:'Funil Reativo',score:22},{label:'Funil Parcial',score:29},{label:'Funil com Filtro Inicial',score:36}],bottlenecks=Object.keys(bottleneckLabels);app.innerHTML=`<div class="content"><div class="eyebrow">Preview de resultados</div><h2>Todos os resultados do Raio-X</h2><p class="subtitle">Abra qualquer combinação para ver a página final com os textos reais.</p>${results.map(r=>`<div class="section"><h3>${escapeHtml(r.label)}</h3><div class="wide-actions">${bottlenecks.map(b=>`<a class="btn btn-secondary" href="${location.pathname}?preview=${r.score}&gargalo=${b}">${escapeHtml(bottleneckLabels[b])}</a>`).join('')}</div></div>`).join('')}</div>`}
    function initPreview(){const params=new URLSearchParams(location.search),preview=params.get('preview'),bottleneck=params.get('gargalo');if(preview==='resultados'){renderPreviewIndex();return}if(preview!==null){const score=Math.max(0,Math.min(36,Number(preview)||0)),validBottleneck=bottleneckLabels[bottleneck]?bottleneck:'mensagem';fillPreviewData(score,validBottleneck);renderResult();return}renderWelcome()}
    function resetAll(){data.name='';data.email='';data.businessName='';data.answers=[];currentStep=-1;selectedOption=null;finalPrompt='';diagnosisSaved=false;previewScore=null;previewBottleneck='';renderWelcome()}
    initPreview();
  </script>
</body>
